services:
  - type: web
    name: signal-forge-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: false

  - type: cron
    name: signal-forge-lunch
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    schedule: "0 3 * * 1-5"
    startCommand: python -m app.jobs lunch
    autoDeploy: false

  - type: cron
    name: signal-forge-evening
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    schedule: "0 9 * * 1-5"
    startCommand: python -m app.jobs evening
    autoDeploy: false
